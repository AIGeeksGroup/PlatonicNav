# Environment: shared-sam2map
# Serves: cross-model preprocessing — SAM2 mask extraction for the shared
# topological map (consumed by ObjectReact Stage B and, transitively,
# PlatonicNavTM Phase 2 navigation).
#
# Entry points:
#   - thought_experiment_round_2/scripts/build_maps/sam2_extract_masks.py
#     (runs SAM2AutomaticMaskGenerator per rendered image → sam2_masks.h5)
#
# Python 3.11 (SAM2 setup.py requires py>=3.10; we pick 3.11 for parity with
# platonicnavtm-bm so users can reuse HF caches seamlessly).
#
# Post-create step: `pip install -e external/sam2`  (installs the repo in
# editable mode so local patches are picked up without reinstall).

name: shared-sam2map
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # PyTorch stack (CUDA 12.1 for H100)
  - pytorch>=2.5.1
  - torchvision>=0.20.1
  - pytorch-cuda=12.1
  # SAM2 runtime deps (from external/sam2/setup.py)
  - numpy>=1.24.4
  - tqdm>=4.66.1
  - hydra-core>=1.3.2
  - iopath>=0.1.10
  - pillow>=9.4.0
  # H5 interchange for the py3.9 → py3.11 mask hand-off
  - h5py
  # Optional but handy for SAM2 notebooks / mask visualization debugging
  - matplotlib>=3.9.1
  - opencv>=4.7
  - pip:
      - huggingface-hub
