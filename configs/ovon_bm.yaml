dataset: ovon
pipeline: blind_match
goal_grounder: blind_match
edge_weight_key: edge_weight_ptm
background_cull: dinov3

# Asset-level inputs. Paths are resolved relative to this config file unless
# absolute. Replace these with your local prepared OVON assets.
episode_manifest: ../examples/ovon_tiny/episode_manifest.json
vocabulary_path: ../examples/ovon_tiny/vocabulary.json
output_dir: ../outputs/ovon_tiny

vision_encoder:
  provider: deterministic
  dim: 3

language_encoder:
  provider: deterministic
  dim: 3

background_cull_config:
  background_terms: ["floor", "ceiling"]
  threshold: 0.95

clusterer:
  n_clusters: 2
  max_iter: 30

ptm:
  geo_weight_key: d_geo_m
  lambda_g: 0.8
  lambda_s: 0.2
  quantile_q: 0.95

planner:
  name: candidate_dijkstra
  edge_weight_key: edge_weight_ptm
